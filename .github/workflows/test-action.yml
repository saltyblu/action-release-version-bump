name: Test Action

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-action:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Prepare fixture files
        run: |
          set -euo pipefail
          mkdir -p .tmp/app
          cat > .tmp/app/deploy.yaml <<'EOF'
          image: ghcr.io/acme/app:v0.1.0 # update-automation:version
          EOF

      - name: Run action
        id: bump
        uses: ./
        with:
          version: "1.2.3"
          tag-prefix: "v"
          working-directory: ".tmp/app"

      - name: Assert outputs and file replacement
        run: |
          set -euo pipefail
          test "${{ steps.bump.outputs.changed }}" = "true"
          test "${{ steps.bump.outputs.updated-count }}" = "1"
          grep -q "v1.2.3" .tmp/app/deploy.yaml
